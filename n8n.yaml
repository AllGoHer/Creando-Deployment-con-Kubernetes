apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
      - name: n8n                  # <-- OJO: Empieza con guion y 2 espacios
        image: n8nio/n8n:latest    # <-- 4 espacios desde el margen izquierdo
        ports:
        - containerPort: 5678      # <-- OJO: Empieza con guion y 4 espacios
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-service
spec:
  type: NodePort
  selector:
    app: n8n
  ports:
  - port: 5678                    # <-- OJO: Empieza con guion y 2 espacios
    targetPort: 5678
    nodePort: 30007
